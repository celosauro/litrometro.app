<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1A4D2E"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="rgba(74,222,128,0.05)"/>
  <circle cx="1100" cy="530" r="250" fill="rgba(74,222,128,0.05)"/>
  
  <!-- Pin de localização com bomba (estilo lineal/outline) -->
  <g transform="translate(450, 60)">
    <!-- Pin de localização (outline) -->
    <path d="M150 0 C80 0 20 60 20 130 C20 210 150 320 150 320 C150 320 280 210 280 130 C280 60 220 0 150 0Z" 
          fill="none" stroke="#4ade80" stroke-width="10" stroke-linejoin="round"/>
    
    <!-- Círculo interno -->
    <circle cx="150" cy="115" r="75" fill="none" stroke="#4ade80" stroke-width="10"/>
    
    <!-- Bomba de combustível (outline style) -->
    <g stroke="#4ade80" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Corpo da bomba -->
      <rect x="110" y="65" width="55" height="100" rx="6"/>
      
      <!-- Visor linha 1 -->
      <line x1="122" y1="90" x2="153" y2="90"/>
      
      <!-- Visor linha 2 -->
      <line x1="122" y1="115" x2="153" y2="115"/>
      
      <!-- Mangueira -->
      <path d="M165 80 L185 80 Q205 80 205 100 L205 150"/>
    </g>
  </g>
  
  <!-- Title: Litrômetro -->
  <text x="600" y="460" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="bold" fill="#4ade80">
    Litrômetro
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="520" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="rgba(74,222,128,0.85)">
    Preços de Combustíveis em Alagoas
  </text>
</svg>
