    <rect x="76" y="52" width="28" height="40" rx="3"/>
    
    <!-- Visor linha 1 -->
    <line x1="82" y1="62" x2="98" y2="62"/>
    
    <!-- Visor linha 2 -->
    <line x1="82" y1="72" x2="98" y2="72"/>
    
