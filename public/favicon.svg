<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Fundo com cantos arredondados -->
  <rect width="32" height="32" rx="7" fill="#1A4D2E"/>
  
  <!-- Pin de localização (outline) -->
  <path d="M16 4 C11 4 7 8 7 13 C7 19 16 28 16 28 C16 28 25 19 25 13 C25 8 21 4 16 4Z" 
        fill="none" stroke="#4ade80" stroke-width="1" stroke-linejoin="round"/>
  
  <!-- Círculo interno -->
  <circle cx="16" cy="12" r="6" fill="none" stroke="#4ade80" stroke-width="1"/>
  
  <!-- Bomba de combustível simplificada -->
  <g stroke="#4ade80" stroke-width="0.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Corpo -->
    <rect x="12.5" y="8" width="5" height="8" rx="0.5"/>
    <!-- Visor -->
    <line x1="13.5" y1="10" x2="16.5" y2="10"/>
    <line x1="13.5" y1="12" x2="16.5" y2="12"/>
    <!-- Mangueira -->
    <path d="M17.5 9.5 L19 9.5 Q20 9.5 20 10.5 L20 14"/>
  </g>
</svg>
