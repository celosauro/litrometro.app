name: Exportar Dados de Combustíveis

on:
  workflow_run:
    workflows: ['Coletar Preços de Combustíveis']
    types: [completed]
  workflow_dispatch:

concurrency:
  group: dados-publicacao
  cancel-in-progress: false

jobs:
  exportar-e-commit:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Reaplicar geocache no Supabase
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: npm run sync:geocache

      - name: Exportar JSON minificado
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: npm run export:json

      - name: Verificar mudanças
        id: changes
        run: |
          if [[ -n $(git status --porcelain public/dados/) ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit e Push dos dados
        if: steps.changes.outputs.changed == 'true'
        run: |
          set -euo pipefail

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add public/dados/
          git commit -m "chore: atualiza dados de preços [$(date -u +'%Y-%m-%d %H:%M UTC')]" || exit 0

          for attempt in 1 2 3; do
            if git push; then
              echo "Push concluído na tentativa $attempt"
              exit 0
            fi

            if [[ "$attempt" -lt 3 ]]; then
              echo "Push rejeitado (tentativa $attempt). Fazendo pull sem rebase e tentando novamente..."
              git pull --no-rebase origin main
            fi
          done

          echo "Falha ao push após 3 tentativas"
          exit 1

      - name: Resumo da exportação
        run: |
          echo "## Exportação" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Mudanças no JSON: ${{ steps.changes.outputs.changed }}" >> "$GITHUB_STEP_SUMMARY"
