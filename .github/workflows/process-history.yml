name: Processar Histórico de Preços

on:
  schedule:
    # Executa diariamente às 06:00 UTC (03:00 BRT)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Permite execução manual

jobs:
  process:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Processar histórico de preços
        run: npm run process:history

      - name: Verificar mudanças
        id: changes
        run: |
          if [[ -n $(git status --porcelain public/dados/atual.json) ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit e Push dos dados
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/dados/atual.json
          git commit -m "chore: atualiza estatísticas de preços [$(date -u +"%Y-%m-%d")]"
          git push

      - name: Log de conclusão
        run: |
          echo "Processamento concluído em $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "Mudanças detectadas: ${{ steps.changes.outputs.changed }}"
