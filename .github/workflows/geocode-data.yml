name: Geocodificar Estabelecimentos

on:
  # Executa diariamente às 06:30 UTC (03:30 BRT)
  schedule:
    - cron: '30 6 * * *'
  # Permite execução manual
  workflow_dispatch:

jobs:
  geocode:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar geocodificação
        env:
          # Supabase (para persistir coordenadas)
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          # APIs de geocodificação (fallbacks opcionais)
          OPENCAGE_API_KEY: ${{ secrets.OPENCAGE_API_KEY }}
          LOCATIONIQ_API_KEY: ${{ secrets.LOCATIONIQ_API_KEY }}
        run: npm run geocode

      - name: Verificar mudanças
        id: changes
        run: |
          if [[ -n $(git status --porcelain public/dados/) ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit e Push dos dados
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/dados/
          git commit -m "chore: atualiza geocodificação [$(date -u +"%Y-%m-%d %H:%M UTC")]"
          git push

      - name: Log de conclusão
        run: |
          echo "Geocodificação concluída em $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "Mudanças detectadas: ${{ steps.changes.outputs.changed }}"
