name: Coletar Preços de Combustíveis

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      municipio:
        description: 'Município específico (opcional)'
        required: false
        type: string

concurrency:
  group: coleta-precos
  cancel-in-progress: false

jobs:
  coletar-sequencial:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    outputs:
      failed_count: ${{ steps.coleta.outputs.failed_count }}
      failed_list: ${{ steps.coleta.outputs.failed_list }}
      success_count: ${{ steps.coleta.outputs.success_count }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Coletar municípios sequencialmente
        id: coleta
        env:
          SEFAZ_APP_TOKEN: ${{ secrets.SEFAZ_APP_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          MUNICIPIO_INPUT: ${{ inputs.municipio || '' }}
        run: |
          set +e

          if [[ -n "$MUNICIPIO_INPUT" ]]; then
            municipios_json=$(node -e "console.log(JSON.stringify([process.argv[1]]))" "$MUNICIPIO_INPUT")
          else
            municipios_json=$(npx tsx -e "import { MUNICIPIOS_AL } from './src/types/index.ts'; console.log(JSON.stringify(Object.values(MUNICIPIOS_AL)))")
          fi

          mapfile -t municipios < <(node -e "for (const item of JSON.parse(process.argv[1])) console.log(item)" "$municipios_json")

          success_count=0
          failed_count=0
          failed_list=''

          for municipio in "${municipios[@]}"; do
            echo "::group::Coleta ${municipio}"
            npx tsx scripts/coletar-precos-supabase.ts "$municipio"
            status=$?

            if [[ $status -eq 0 ]]; then
              success_count=$((success_count + 1))
              echo "✓ ${municipio}"
            else
              failed_count=$((failed_count + 1))
              echo "✗ ${municipio}"
              if [[ -z "$failed_list" ]]; then
                failed_list="$municipio"
              else
                failed_list="$failed_list, $municipio"
              fi
            fi

            echo "::endgroup::"
          done

          echo "success_count=$success_count" >> "$GITHUB_OUTPUT"
          echo "failed_count=$failed_count" >> "$GITHUB_OUTPUT"
          echo "failed_list=$failed_list" >> "$GITHUB_OUTPUT"

          echo "## Resumo da Coleta" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Municípios com sucesso: $success_count" >> "$GITHUB_STEP_SUMMARY"
          echo "- Municípios com falha: $failed_count" >> "$GITHUB_STEP_SUMMARY"
          if [[ -n "$failed_list" ]]; then
            echo "- Falhas: $failed_list" >> "$GITHUB_STEP_SUMMARY"
          fi

  exportar-e-commit:
    needs: coletar-sequencial
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Exportar JSON minificado
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: npm run export:json

      - name: Verificar mudanças
        id: changes
        run: |
          if [[ -n $(git status --porcelain public/dados/) ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit e Push dos dados
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/dados/
          git commit -m "chore: atualiza dados de preços [$(date -u +'%Y-%m-%d %H:%M UTC')]" || exit 0
          git push

      - name: Resumo da exportação
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Exportação" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Mudanças no JSON: ${{ steps.changes.outputs.changed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Sucessos na coleta: ${{ needs.coletar-sequencial.outputs.success_count }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Falhas na coleta: ${{ needs.coletar-sequencial.outputs.failed_count }}" >> "$GITHUB_STEP_SUMMARY"
          if [[ -n "${{ needs.coletar-sequencial.outputs.failed_list }}" ]]; then
            echo "- Municípios com falha: ${{ needs.coletar-sequencial.outputs.failed_list }}" >> "$GITHUB_STEP_SUMMARY"
          fi

  validar-falhas:
    needs: [coletar-sequencial, exportar-e-commit]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Falhar workflow se algum município falhou
        run: |
          if [[ "${{ needs.coletar-sequencial.outputs.failed_count }}" != "0" ]]; then
            echo "Falhas na coleta: ${{ needs.coletar-sequencial.outputs.failed_list }}"
            exit 1
          fi

          echo "Coleta sequencial concluída sem falhas"
