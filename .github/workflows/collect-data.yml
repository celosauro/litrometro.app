name: Coletar Preços de Combustíveis

on:
  schedule:
    # Executa a cada hora
    - cron: '0 * * * *'
  workflow_dispatch:
    # Permite execução manual

jobs:
  collect:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Coletar dados para Supabase
        env:
          SEFAZ_APP_TOKEN: ${{ secrets.SEFAZ_APP_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: npm run collect:supabase

      - name: Exportar JSON minificado
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: npm run export:json

      - name: Verificar mudanças
        id: changes
        run: |
          if [[ -n $(git status --porcelain public/dados/) ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit e Push dos dados
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/dados/
          git commit -m "chore: atualiza dados de preços [$(date -u +"%Y-%m-%d %H:%M UTC")]"
          git push

      - name: Log de conclusão
        run: |
          echo "Coleta concluída em $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "Mudanças detectadas: ${{ steps.changes.outputs.changed }}"
